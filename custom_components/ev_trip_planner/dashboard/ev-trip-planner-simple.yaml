# Simple dashboard template for EV Trip Planner - No charts
# This template is used when Lovelace is not available or charts are not desired
# Uses only markdown cards for compatibility

title: "EV Trip Planner - {{ vehicle_name }}"
# Auto-refresh every 30 seconds to reflect changes immediately
refresh_interval: 30
views:
  - title: "{{ vehicle_name }} - Estado"
    path: "{{ vehicle_id }}"
    icon: mdi:car-electric
    # Responsive: 2 columns on tablet/desktop, 1 on mobile
    columns: 2
    cards:
      # EMHASS Integration Setup Card
      - type: markdown
        title: "🔧 Configuración EMHASS"
        content: |
          ## ¡Integración EMHASS configurada!

          Para completar la integración con EMHASS, añade este comando shell a tu `configuration.yaml`:

          ```yaml
          shell_command:
            emhass_day_ahead_optim: >
              curl -i -H "Content-Type: application/json" -X POST -d '{
                "P_deferrable": {{ (state_attr('sensor.emhass_perfil_diferible_{{ vehicle_id }}', 'power_profile_watts') | default([0]*168, true)) | tojson }}
              }' http://TU_IP_EMHASS:5000/action/dayahead-optim
          ```

          **Reemplaza:**
          - `TU_IP_EMHASS`: La IP de tu instancia EMHASS (ej: `192.168.1.201`)

          📖 **[Ver documentación completa](https://github.com/davidusb-ge/emhass)** | **[Guía de integración EMHASS](../ev_trip_planner/docs/EMHASS_INTEGRATION.md)**

          ---

          *Después de añadir el comando, reinicia Home Assistant y prueba el servicio `shell_command.emhass_day_ahead_optim`*
      # Trip status card
      - type: markdown
        title: "🚗 Estado de Viajes - {{ vehicle_name }}"
        content: |
          {% set trips_list_sensor = 'sensor.' ~ vehicle_id ~ '_trips_list' %}
          {% set trips_count = states(trips_list_sensor) | default('0') %}
          {% set next_trip = states('sensor.' ~ vehicle_id ~ '_next_trip') | default('N/A') %}
          {% set kwh_needed = states('sensor.' ~ vehicle_id ~ '_kwh_needed_today') | default('0') %}

          **Viajes programados:** {{ trips_count }}
          **Próximo viaje:** {{ next_trip }}
          **kWh necesarios hoy:** {{ kwh_needed }} kWh

          ---

          *Estado actualizado automáticamente*

      # Recurring trips list card
      - type: markdown
        title: "🔄 Viajes Recurrentes"
        style: |
          ha-card { overflow-x: auto; }
        content: |
          {% set trips_list_sensor = 'sensor.' ~ vehicle_id ~ '_trips_list' %}
          {% set trips = state_attr(trips_list_sensor, 'recurring_trips') | default([]) %}

          {% if trips | length == 0 %}
          *No hay viajes recurrentes programados*
          {% else %}
          | ID | Día | Hora | km | kWh | Descripción | Estado |
          |----|-----|------|----|----|-------------|--------|
          {% for trip in trips %}
          | **{{ trip.id }}** | {{ trip.dia_semana | default('-') }} | {{ trip.hora | default('-') }} | {{ trip.km | default(0) }} | {{ trip.kwh | default(0) }} | {{ trip.descripcion | default('-') }} | {{ '⏸ Pausado' if not trip.activo else '✓ Activo' }} |
          {% endfor %}
          {% endif %}

          ---

          *Viajes semanales programados (usa el ID para editar)*

      # Punctual trips list card
      - type: markdown
        title: "📅 Viajes Puntuales"
        style: |
          ha-card { overflow-x: auto; }
        content: |
          {% set trips_list_sensor = 'sensor.' ~ vehicle_id ~ '_trips_list' %}
          {% set trips = state_attr(trips_list_sensor, 'punctual_trips') | default([]) %}

          {% if trips | length == 0 %}
          *No hay viajes puntuales programados*
          {% else %}
          | ID | Fecha/Hora | km | kWh | Descripción | Estado |
          |----|------------|----|----|-------------|--------|
          {% for trip in trips %}
          | **{{ trip.id }}** | {{ trip.datetime | default('-') }} | {{ trip.km | default(0) }} | {{ trip.kwh | default(0) }} | {{ trip.descripcion | default('-') }} | {{ '✓ Completado' if trip.estado == 'completado' else ('❌ Cancelado' if trip.estado == 'cancelado' else '⏳ Pendiente') }} |
          {% endfor %}
          {% endif %}

          ---

          *Viajes únicos programados (usa el ID para editar)*

      # Deferrable loads monitoring card
      - type: markdown
        title: "⚡ Cargas Diferibles - {{ vehicle_name }}"
        content: |
          {% set deferrable_sensor = 'sensor.emhass_perfil_diferible_' ~ vehicle_id %}
          {% set deferrable_state = states(deferrable_sensor) | default('No disponible') %}
          {% set power_profile = state_attr(deferrable_sensor, 'power_profile_watts') %}
          {% set schedule = state_attr(deferrable_sensor, 'deferrables_schedule') %}

          **Sensor de carga diferible:** {{ deferrable_sensor }}
          **Estado:** {{ deferrable_state }}

          {% if power_profile %}
          **Perfil de potencia:** {{ power_profile | length }} horas
          {% else %}
          **Perfil de potencia:** No configurado
          {% endif %}

          {% if schedule %}
          **Schedule configurado:** {{ schedule | length }} entradas
          {% else %}
          **Schedule:** No disponible
          {% endif %}

          ---

          *Cargas diferibles para optimización EMHASS*

      # Vehicle status card
      - type: markdown
        title: "🔋 Estado del Vehículo - {{ vehicle_name }}"
        content: |
          {% set soc_sensor = states('{{ config.soc_sensor }}') | default('N/A') %}
          {% set range_sensor = states('sensor.{{ vehicle_id }}_range') | default('N/A') %}
          {% set charging_status = states('binary_sensor.{{ vehicle_id }}_charging') | default('N/A') %}

          **SOC batería:** {{ soc_sensor }}%
          **Autonomía:** {{ range_sensor }} km
          **Estado de carga:** {{ charging_status }}

          ---

          *Información del vehículo*

      # Presence status card
      - type: markdown
        title: "📍 Presencia - {{ vehicle_name }}"
        content: |
          {% set home_status = states('binary_sensor.{{ vehicle_id }}_home') | default('N/A') %}
          {% set plugged_status = states('binary_sensor.{{ vehicle_id }}_plugged') | default('N/A') %}

          **En casa:** {{ home_status }}
          **Enchufado:** {{ plugged_status }}

          ---

          *Detección de presencia para carga automática*

      # Quick stats entities card
      - type: entities
        title: "📊 Métricas"
        entities:
          - entity: sensor.{{ vehicle_id }}_trips_list
            name: Viajes totales
          - entity: sensor.{{ vehicle_id }}_kwh_today
            name: kWh necesarios hoy
          - entity: sensor.{{ vehicle_id }}_next_trip
            name: Próximo viaje
          - entity: sensor.emhass_perfil_diferible_{{ vehicle_id }}
            name: Carga diferible EMHASS
            icon: mdi:lightning-bolt

  # CRUD View - Create/Edit/Delete Trips
  - title: "{{ vehicle_name }} - Gestionar Viajes"
    path: "{{ vehicle_id }}-crud"
    icon: mdi:calendar-edit
    # Responsive: Single column on mobile for CRUD operations
    columns: 1
    # Auto-refresh to show immediate updates after CRUD operations
    cards:
      # Create Recurring Trip Section
      - type: markdown
        title: "➕ Crear Viaje Recurrente"
        content: |
          ### Viaje Recurrente Semanal

          Programa un viaje que se repetirá cada semana.

          **Servicios disponibles:**
          - `ev_trip_planner.add_recurring_trip` - Crear viaje recurrente
          - `ev_trip_planner.add_punctual_trip` - Crear viaje puntual

      # Helper entities info
      - type: markdown
        content: |
          ### Input Helpers requeridos

          Para usar el formulario visual, crea estos input helpers en Home Assistant:

          ```yaml
          input_select:
            {{ vehicle_id }}_trip_day:
              name: Día de la semana
              options:
                - Lunes
                - Martes
                - Miércoles
                - Jueves
                - Viernes
                - Sábado
                - Domingo
              initial: Lunes

          input_datetime:
            {{ vehicle_id }}_trip_time:
              name: Hora del viaje
              has_date: false
              has_time: true

          input_number:
            {{ vehicle_id }}_trip_km:
              name: Kilómetros
              min: 0
              max: 1000
              step: 1
              mode: box

            {{ vehicle_id }}_trip_kwh:
              name: kWh necesarios
              min: 0
              max: 200
              step: 0.5
              mode: box

          input_text:
            {{ vehicle_id }}_trip_desc:
              name: Descripción del viaje
          ```

      # Button card for adding recurring trip (requires input helpers)
      - type: custom:button-card
        name: "✅ Crear Viaje Recurrente"
        icon: mdi:plus-circle
        color: "#4CAF50"
        size: 80%
        tap_action:
          action: call-service
          service: ev_trip_planner.add_recurring_trip
          service_data:
            vehicle_id: "{{ vehicle_id }}"
            dia_semana: "Lunes"
            hora: "08:00:00"
            km: 30
            kwh: 5
            descripcion: "Viaje de prueba"
        style: |
          .card {
            background: var(--card-background-color);
            border-radius: 10px;
            min-height: 60px;
          }
          @media (max-width: 600px) {
            .card {
              width: 100% !important;
            }
          }

      # Divider
      - type: markdown
        content: "---"

      # Create Punctual Trip Section
      - type: markdown
        title: "📅 Crear Viaje Puntual"
        content: |
          ### Viaje Puntual

          Programa un viaje único para una fecha y hora específica.

      # Button card for adding punctual trip
      - type: custom:button-card
        name: "✅ Crear Viaje Puntual"
        icon: mdi:plus-circle
        color: "#2196F3"
        size: 80%
        tap_action:
          action: call-service
          service: ev_trip_planner.add_punctual_trip
          service_data:
            vehicle_id: "{{ vehicle_id }}"
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
            km: 50
            kwh: 8
            descripcion: "Viaje puntual de prueba"
        style: |
          .card {
            background: var(--card-background-color);
            border-radius: 10px;
            min-height: 60px;
          }
          @media (max-width: 600px) {
            .card {
              width: 100% !important;
            }
          }

      # Divider
      - type: markdown
        content: "---"

      # Quick action buttons
      - type: markdown
        title: "✏️ Acciones Rápidas"
        content: |
          ### Acciones sobre viajes

      # Quick action buttons for recurring trips
      - type: custom:button-card
        name: "⏸ Pausar"
        icon: mdi:pause-circle
        color: "#FFA500"
        size: 70%
        tap_action:
          action: call-service
          service: ev_trip_planner.pause_recurring_trip
          service_data:
            vehicle_id: "{{ vehicle_id }}"
            trip_id: "rec_last"
        style: |
          .card {
            background: var(--card-background-color);
            border-radius: 10px;
            min-height: 50px;
          }

      - type: custom:button-card
        name: "▶️ Reanudar"
        icon: mdi:play-circle
        color: "#4CAF50"
        size: 70%
        tap_action:
          action: call-service
          service: ev_trip_planner.resume_recurring_trip
          service_data:
            vehicle_id: "{{ vehicle_id }}"
            trip_id: "rec_last"
        style: |
          .card {
            background: var(--card-background-color);
            border-radius: 10px;
            min-height: 50px;
          }

      - type: custom:button-card
        name: "🗑️ Eliminar"
        icon: mdi:delete
        color: "#F44336"
        size: 70%
        tap_action:
          action: call-service
          service: ev_trip_planner.delete_trip
          service_data:
            vehicle_id: "{{ vehicle_id }}"
            trip_id: "rec_last"
        style: |
          .card {
            background: var(--card-background-color);
            border-radius: 10px;
            min-height: 50px;
          }

      # Quick action buttons for punctual trips
      - type: custom:button-card
        name: "✅ Completar"
        icon: mdi:check-circle
        color: "#4CAF50"
        size: 70%
        tap_action:
          action: call-service
          service: ev_trip_planner.complete_punctual_trip
          service_data:
            vehicle_id: "{{ vehicle_id }}"
            trip_id: "pun_last"
        style: |
          .card {
            background: var(--card-background-color);
            border-radius: 10px;
            min-height: 50px;
          }

      - type: custom:button-card
        name: "❌ Cancelar"
        icon: mdi:cancel
        color: "#FF9800"
        size: 70%
        tap_action:
          action: call-service
          service: ev_trip_planner.cancel_punctual_trip
          service_data:
            vehicle_id: "{{ vehicle_id }}"
            trip_id: "pun_last"
        style: |
          .card {
            background: var(--card-background-color);
            border-radius: 10px;
            min-height: 50px;
          }

      - type: custom:button-card
        name: "🗑️ Eliminar"
        icon: mdi:delete
        color: "#F44336"
        size: 70%
        tap_action:
          action: call-service
          service: ev_trip_planner.delete_trip
          service_data:
            vehicle_id: "{{ vehicle_id }}"
            trip_id: "pun_last"
        style: |
          .card {
            background: var(--card-background-color);
            border-radius: 10px;
            min-height: 50px;
          }

      # Service call info card
      - type: markdown
        title: "💡 Cómo usar los servicios"
        content: |
          ### Servicios disponibles

          Puedes llamar a estos servicios desde el desarrollador de servicios:

          **Crear viaje recurrente:**
          ```
          ev_trip_planner.add_recurring_trip
          {
            "vehicle_id": "{{ vehicle_id }}",
            "dia_semana": "Lunes",
            "hora": "08:00:00",
            "km": 30,
            "kwh": 5,
            "descripcion": "Trabajo"
          }
          ```

          **Crear viaje puntual:**
          ```
          ev_trip_planner.add_punctual_trip
          {
            "vehicle_id": "{{ vehicle_id }}",
            "datetime": "2026-03-25 09:00:00",
            "km": 50,
            "kwh": 8,
            "descripcion": "Cita"
          }
          ```

          **Editar viaje:**
          ```
          ev_trip_planner.edit_trip
          {
            "vehicle_id": "{{ vehicle_id }}",
            "trip_id": "rec_...",
            "updates": {"km": 35}
          }
          ```

          **Eliminar viaje:**
          ```
          ev_trip_planner.delete_trip
          {
            "vehicle_id": "{{ vehicle_id }}",
            "trip_id": "rec_..."
          }
          ```
