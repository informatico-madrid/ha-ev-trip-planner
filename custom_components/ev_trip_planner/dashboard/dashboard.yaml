# Dashboard base para EV Trip Planner (Milestone 3.2)
# Plantilla actualizada con múltiples vehículos y EMHASS Integration

views:
  - title: EV Trip Planner
    path: ev-trip-planner
    icon: mdi:car-electric
    cards:
      # Tarjeta de estado general (Milestone 3.2 - Múltiples vehículos)
      - type: markdown
        title: 📊 Estado general
        content: |
          **Vehículos configurados:** 2 (Chispitas + Morgan)
          
          **Viajes totales:**
          - Chispitas: {{ states('sensor.chispitas_trips_count') or '0' }} viajes
          - Morgan: {{ states('sensor.morgan_trips_count') or '0' }} viajes
          
          **Próximo viaje:** {{ states('sensor.morgan_next_trip') or 'N/A' }}

      # Tarjeta de integración EMHASS (Milestone 3)
      - type: markdown
        title: ⚡ Integración EMHASS
        content: |
          **Estado optimización:** {{ states('sensor.emhass_optim_status') }}
          **Horizonte planificación:** {{ states('sensor.emhass_planning_horizon') }} días
          **Cargas diferibles activas:** {{ states('sensor.emhass_deferrable_loads') }}
          
          ---
          
          *Optimización automática basada en precios y solar*
    
      # Tarjeta de detección de presencia (Milestone 3)
      - type: markdown
        title: 📍 Detección de Presencia
        content: |
          **Vehículo en casa:** {{ states('binary_sensor.morgan_en_casa') }}
          **Coordenadas actuales:** {{ states('sensor.morgan_location') }}
          **Radio de proximidad:** {{ states('input_number.morgan_home_radius') }} m
          
          ---
          
          *Carga automática cuando el vehículo está en casa*
    
      # Tarjeta de control de vehículo (Milestone 3)
      - type: markdown
        title: 🎛️ Control de Vehículo
        content: |
          **Carga activa:** {{ states('switch.morgan_charging') }}
          **Potencia actual:** {{ states('sensor.morgan_charging_power') }} kW
          **SOC objetivo:** {{ states('input_number.morgan_target_soc') }}%
          **Índice EMHASS:** {{ states('input_number.morgan_emhass_index') }}
          
          ---
          
          *Control inteligente basado en viajes programados*
    
      # Tarjeta de estado del vehículo (Milestone 3)
      - type: markdown
        title: 🚗 Estado del Vehículo
        content: |
          **SOC actual:** {{ states('sensor.morgan_battery_level') }}%
          **Autonomía restante:** {{ states('sensor.morgan_range') }} km
          **Próximo viaje:** {{ states('sensor.morgan_next_trip') }}
          **kWh necesarios:** {{ states('sensor.morgan_required_kwh') }} kWh
          
          ---
          
          *Milestone 3 completado ✅ - EMHASS Integration*

      # Tarjeta de múltiples vehículos (Milestone 3.2)
      - type: markdown
        title: 🚗🚗 Vehículos Configurados
        content: |
          **Chispitas (OVMS):** {{ states('sensor.ovms_chispitas_metric_v_b_soc') }}% SOC
          **Morgan (Renault):** {{ states('sensor.renault_battery_level') }}% SOC
          
          **Viajes activos:**
          - Chispitas: {{ states('sensor.chispitas_trips_count') }} viajes
          - Morgan: {{ states('sensor.morgan_trips_count') }} viajes
          
          ---
          
          *Milestone 3.2 completado ✅ - Soporte múltiple vehículos*

      - type: entities
        title: 📈 Métricas del Sistema
        entities:
          - entity: sensor.emhass_optim_status
            name: Estado EMHASS
            icon: mdi:chart-line
          - entity: sensor.morgan_presence_status
            name: Presencia Morgan
            icon: mdi:home-map-marker
          - entity: sensor.chispitas_trips_list
            name: Viajes Chispitas
            icon: mdi:format-list-numbered
          - entity: sensor.morgan_trips_list
            name: Viajes Morgan
            icon: mdi:format-list-numbered
