version: '3.8'

services:
  homeassistant:
    image: homeassistant/home-assistant:stable
    container_name: ha-ev-trip-planner-test
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      # Custom component (read-write so HA can store data via the Store API)
      - ./custom_components/ev_trip_planner:/config/custom_components/ev_trip_planner
      # E2E test configuration (trusted_networks auth + input_boolean)
      - ./tests/ha-manual/configuration.yaml:/config/configuration.yaml:ro
    environment:
      - TZ=Europe/Madrid
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8123/api/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

