blueprint:
  name: EMHASS Charge Control
  description: Template automation for EMHASS-controlled vehicle charging based on MPC plan deferrable load
  domain: automation
  input:
    vehicle_id:
      name: Vehicle ID
      description: The vehicle identifier used in sensor names (e.g., ovms_chispitas)
      default: ovms_chispitas
    home_sensor:
      name: Home Sensor
      description: Binary sensor entity that indicates if the vehicle is at home
      selector:
        entity:
          domain: binary_sensor
    plugged_sensor:
      name: Plugged Sensor
      description: Sensor entity that indicates if the vehicle is plugged in (on/off)
      selector:
        entity:
          domain: sensor
    charge_switch:
      name: Charge Switch
      description: Switch entity to start/stop charging
      selector:
        entity:
          domain: switch
    manual_mode_input:
      name: Manual Mode Input
      description: Input boolean that controls manual mode override
      selector:
        entity:
          domain: input_boolean
    emhass_plan_sensor:
      name: EMHASS Plan Sensor
      description: Sensor containing the EMHASS MPC plan with p_deferrable values
      selector:
        entity:
          domain: sensor

alias: EMHASS Charge Control Template
description: Template automation for EMHASS charge control - configure vehicle_id at include time
mode: single
max_exceeded: silent
triggers:
  - time_pattern:
      minutes: "5"
  - time_pattern:
      minutes: "35"
variables:
  vehicle_id: "{{ vehicle_id | default('ovms_chispitas') }}"
  hora_actual: "{{ now().hour }}"
  p_deferrable0: "{{ state_attr('sensor.emhass_plan_' ~ vehicle_id ~ '_mpc_congelado', 'plan_deferrable0_horario_mpc')[hora_actual] | int(0) }}"
  coche_en_casa: "{{ is_state('binary_sensor.carga_' ~ vehicle_id ~ '_coche_en_casa', 'on') }}"
  coche_enchufado: "{{ is_state('sensor.carga_' ~ vehicle_id ~ '_enchufado', 'on') }}"
  carga_activa: "{{ is_state('switch.carga_' ~ vehicle_id ~ '_iniciar_carga', 'on') }}"
  debe_cargar: "{{ p_deferrable0 > 100 and coche_en_casa and coche_enchufado }}"
  debe_detener: "{{ p_deferrable0 == 0 and carga_activa }}"
conditions:
  - condition: template
    value_template: "{{ states('sensor.emhass_plan_' ~ vehicle_id ~ '_mpc_congelado') not in ['unavailable', 'unknown'] }}"
  - condition: state
    entity_id: input_boolean.carga_{{ vehicle_id }}_modo_manual
    state: "off"
actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ debe_cargar }}"
        sequence:
          - service: switch.turn_on
            entity_id: switch.carga_{{ vehicle_id }}_iniciar_carga
      - conditions:
          - condition: template
            value_template: "{{ debe_detener }}"
        sequence:
          - service: switch.turn_off
            entity_id: switch.carga_{{ vehicle_id }}_iniciar_carga
      - conditions:
          - condition: template
            value_template: "{{ (not coche_en_casa or not coche_enchufado) and p_deferrable0 > 100 }}"
        sequence:
          - service: persistent_notification.create
            data:
              title: "Charging Opportunity Missed"
              message: "EMHASS scheduled charging for vehicle {{ vehicle_id }}, but car is {{ 'not at home' if not coche_en_casa else 'not plugged in' }}."
