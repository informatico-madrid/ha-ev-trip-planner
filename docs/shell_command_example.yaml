# Shell Command Example for EMHASS Integration

This file provides a complete shell command example that integrates EV Trip Planner sensors with EMHASS.

---

## Complete Shell Command

Add this to your Home Assistant `configuration.yaml`:

```yaml
shell_command:
  emhass_day_ahead_optim: >
    curl -i -H "Content-Type: application/json" -X POST -d '{
      "P_deferrable": {{ (state_attr('sensor.emhass_perfil_diferible_YOUR_VEHICLE_ID', 'power_profile_watts') | default([0]*168, true)) | tojson }}
    }' http://YOUR_EMHASS_IP:5000/action/dayahead-optim
```

---

## Multiple Vehicles Example

For multiple vehicles, aggregate their power profiles:

```yaml
shell_command:
  emhass_day_ahead_optim: >
    curl -i -H "Content-Type: application/json" -X POST -d '{
      "P_deferrable": {{ (
        state_attr('sensor.emhass_perfil_diferible_vehicle_1', 'power_profile_watts') | default([0]*168, true) +
        state_attr('sensor.emhass_perfil_diferible_vehicle_2', 'power_profile_watts') | default([0]*168, true)
      ) | tojson }}
    }' http://YOUR_EMHASS_IP:5000/action/dayahead-optim
```

---

## Configuration Parameters

| Parameter | Description | Example |
|-----------|-------------|---------|
| `YOUR_VEHICLE_ID` | The vehicle identifier from EV Trip Planner | `ovms_chispitas`, `morgan`, `tesla_model_3` |
| `YOUR_EMHASS_IP` | IP address of your EMHASS instance | `192.168.1.100` |
| `power_profile_watts` | Array of 168 values (7 days × 24 hours) | `[0, 0, 3600, 0, ...]` |

---

## Power Profile Format

The `power_profile_watts` attribute contains:

- **Array length**: 168 values (planning_horizon × 24)
  - Default: 7 days × 24 hours = 168 values
- **Value meaning**:
  - `0` = No charging scheduled
  - Positive value (e.g., `3600`) = Charging power in watts

---

## Integration Flow

```
EV Trip Planner
      ↓
Template Sensor: sensor.emhass_perfil_diferible_{vehicle_id}
      ↓
    Attributes: power_profile_watts (array)
      ↓
Shell Command (curl to EMHASS)
      ↓
EMHASS Optimization Engine
      ↓
Optimized Charging Schedule
```

---

## Setup Steps

1. **Configure EV Trip Planner**: Add your vehicle(s) through the EV Trip Planner config flow
2. **Copy shell command**: Use one of the examples above, replacing placeholders
3. **Add to configuration.yaml**: Add the shell command under `shell_command:` section
4. **Restart Home Assistant**: Apply the new configuration
5. **Test execution**: Run the shell command from Developer Tools → Services
6. **Verify in EMHASS**: Check that EMHASS receives the deferrable load data

---

## Troubleshooting

### Sensor Not Found

If you see "sensor not found" errors:
- Verify the vehicle was configured in EV Trip Planner
- Check that the sensor entity exists: `sensor.emhass_perfil_diferible_{vehicle_id}`

### EMHASS Connection Failed

If curl fails:
- Verify EMHASS is running: `http://YOUR_EMHASS_IP:5000`
- Check network connectivity from HA to EMHASS
- Verify EMHASS API endpoint is correct

### Empty Power Profile

If all values are 0:
- Check that trips are scheduled in EV Trip Planner
- Verify planning horizon includes the trip deadline
