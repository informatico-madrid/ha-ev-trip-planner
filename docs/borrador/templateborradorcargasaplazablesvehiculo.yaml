 # =================================================================
  # CARGAS DIFERIBLES - Perfiles para EMHASS (Coches Eléctricos)
  # =================================================================
  - name: "EMHASS Perfil Diferible OVMS Chispitas"
    unique_id: emhass_perfil_diferible_ovms
    state: "{{ now().isoformat() }}"
    icon: mdi:car-electric
    attributes:
      power_profile_watts: >-
        {%- set ns = namespace(profile=[]) %}
        {%- set ahora = now() %}
        {%- if ahora.minute == 0 and ahora.second == 0 and ahora.microsecond == 0 %}
          {%- set start_time = ahora %}
        {%- else %}
          {%- set start_time = ahora.replace(minute=0, second=0, microsecond=0) + timedelta(hours=1) %}
        {%- endif %}
        
        {# Mapeo correcto: Python weekday() → índice dias_semana #}
        {%- set dias_semana = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'] %}
        {%- set potencia_nominal = 3600 %}  {# 16A monofásico #}
        {%- set hora_inicio_disponible = 9 %}
        {%- set hora_fin_disponible = 17 %}
        {%- set horas_disponibles_por_dia = hora_fin_disponible - hora_inicio_disponible %}
        
        {# Leer kWh necesarios por día desde los sliders #}
        {%- set kwh_por_dia = {
          'domingo': states('input_number.ovms_carga_necesaria_domingo') | float(0),
          'lunes': states('input_number.ovms_carga_necesaria_lunes') | float(0),
          'martes': states('input_number.ovms_carga_necesaria_martes') | float(0),
          'miercoles': states('input_number.ovms_carga_necesaria_miercoles') | float(0),
          'jueves': states('input_number.ovms_carga_necesaria_jueves') | float(0),
          'viernes': states('input_number.ovms_carga_necesaria_viernes') | float(0),
          'sabado': states('input_number.ovms_carga_necesaria_sabado') | float(0)
        } %}
        
        {# Generar perfil de 168 horas #}
        {%- for i in range(168) %}
          {%- set current_time = start_time + timedelta(hours=i) %}
          {%- set python_weekday = current_time.weekday() %}
          
          {# Conversión correcta: lunes(0)→1, martes(1)→2, ..., domingo(6)→0 #}
          {%- if python_weekday == 6 %}
            {%- set day_index = 0 %}
          {%- else %}
            {%- set day_index = python_weekday + 1 %}
          {%- endif %}
          
          {%- set nombre_dia = dias_semana[day_index] %}
          {%- set kwh_dia = kwh_por_dia[nombre_dia] %}
          {%- set horas_necesarias_dia = (kwh_dia * 1000 / potencia_nominal) | round(0, 'ceil') | int %}
          {%- set horas_a_asignar = [horas_necesarias_dia, horas_disponibles_por_dia] | min %}
          
          {%- set hora_actual = current_time.hour %}
          
          {# Asignar potencia solo si estamos en ventana disponible Y no hemos excedido horas #}
          {%- if hora_actual >= hora_inicio_disponible and hora_actual < hora_fin_disponible %}
            {%- set hora_relativa = hora_actual - hora_inicio_disponible %}
            {%- if hora_relativa < horas_a_asignar %}
              {%- set ns.profile = ns.profile + [potencia_nominal] %}
            {%- else %}
              {%- set ns.profile = ns.profile + [0] %}
            {%- endif %}
          {%- else %}
            {%- set ns.profile = ns.profile + [0] %}
          {%- endif %}
        {%- endfor %}
        {{ ns.profile }}