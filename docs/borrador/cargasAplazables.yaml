alias: 🚗 Control Cargas Aplazables según Plan MPC
description: >
  Controla automáticamente la carga de Chispitas (OVMS) y Morgan (V2C) según el
  plan MPC de EMHASS. Se ejecuta 5 minutos después de cada actualización MPC
  (cada 30 minutos).
mode: single
max_exceeded: silent
triggers:
  - minutes: "5"
    id: mpc_schedule_first
    trigger: time_pattern
  - minutes: "35"
    id: mpc_schedule_second
    trigger: time_pattern
conditions:
  - condition: template
    value_template: >
      {{ states('sensor.emhass_plan_ovms_chispitas_mpc_congelado') not in
      ['unavailable', 'unknown', 'none'] }}
  - condition: template
    value_template: >
      {{ states('sensor.emhass_plan_morgan_mpc_congelado') not in
      ['unavailable', 'unknown', 'none'] }}
  - condition: template
    value_template: |
      {{ not (is_state('input_boolean.carga_chispitas_modo_manual', 'on') and 
              is_state('input_boolean.carga_morgan_modo_manual', 'on')) }}
actions:
  - variables:
      plan_chispitas: >
        {{ state_attr('sensor.emhass_plan_ovms_chispitas_mpc_congelado',
        'plan_deferrable0_horario_mpc') | default([]) }}
      potencia_chispitas_ahora: >
        {%- set now = now() %} {%- set potencia = namespace(valor=0) %} {%- for
        entry in plan_chispitas %}
          {%- if entry is mapping and 'date' in entry and 'p_deferrable0' in entry %}
            {%- set entry_time = entry.date | as_datetime %}
            {%- if entry_time.hour == now.hour %}
              {%- set potencia.valor = entry.p_deferrable0 | float(0) %}
            {%- endif %}
          {%- endif %}
        {%- endfor %} {{ potencia.valor }}
      chispitas_en_casa: "{{ is_state('binary_sensor.ovms_chispitas_en_casa', 'on') }}"
      chispitas_enchufado: "{{ is_state('binary_sensor.ovms_chispitas_metric_v_d_cp', 'on') }}"
      chispitas_soc: "{{ states('sensor.ovms_chispitas_metric_v_b_soc') | float(0) }}"
      chispitas_soc_alto: "{{ chispitas_soc > 90 }}"
      debe_cargar_chispitas: |
        {{ potencia_chispitas_ahora | float(0) > 100 and 
           chispitas_en_casa | bool and 
           chispitas_enchufado | bool and 
           not chispitas_soc_alto | bool }}
  - choose:
      - conditions:
          - condition: state
            entity_id: input_boolean.carga_chispitas_modo_manual
            state: "off"
          - condition: template
            value_template: "{{ debe_cargar_chispitas }}"
          - condition: template
            value_template: >-
              {{ is_state('binary_sensor.ovms_chispitas_metric_v_c_charging',
              'off') }}
        sequence:
          - data:
              vehicle_id: chispitas
              action: start
            action: ovms.control_charging
          - data:
              name: 🚗 Control Carga Chispitas
              message: >
                Iniciando carga según plan MPC ({{ potencia_chispitas_ahora |
                int }}W). SOC actual: {{ chispitas_soc | int }}%
              entity_id: sensor.ovms_chispitas_metric_v_b_soc
            action: logbook.log
      - conditions:
          - condition: state
            entity_id: input_boolean.carga_chispitas_modo_manual
            state: "off"
          - condition: template
            value_template: "{{ not debe_cargar_chispitas }}"
          - condition: template
            value_template: >-
              {{ is_state('binary_sensor.ovms_chispitas_metric_v_c_charging',
              'on') }}
          - condition: template
            value_template: "{{ chispitas_en_casa }}"
          - condition: template
            value_template: "{{ states('sensor.victron_battery_soc') | float(0) > 95 }}"
        sequence:
          - data:
              message: >
                ⚠️ ATENCIÓN: La batería Victron está al {{
                states('sensor.victron_battery_soc') | int }}%. Se requiere
                detener manualmente la carga de Chispitas para evitar salto del
                diferencial. El plan MPC solicita detener, pero la acción
                automática está bloqueada por seguridad.
              preannounce: true
            target:
              device_id: c4687ddd4c955825bc1538578374a35d
            action: assist_satellite.announce
          - data:
              title: 🚨 CHISPITAS - Acción Manual Requerida
              message: >
                **SOC Victron:** {{ states('sensor.victron_battery_soc') }}%
                (>95%)

                **Problema:** Detener 3600W abruptamente puede causar
                sobrevoltaje y salto del diferencial.

                **Acción requerida:** Detener carga manualmente desde la app
                OVMS o desenchufar progresivamente.

                **Plan MPC:** Solicita detener carga ahora. **Chispitas SOC:**
                {{ chispitas_soc | int }}%
              notification_id: chispitas_soc_victron_alto
            action: persistent_notification.create
          - data:
              name: 🚗 Control Carga Chispitas - BLOQUEADO
              message: >
                ⚠️ Desconexión automática BLOQUEADA por seguridad. SOC Victron:
                {{ states('sensor.victron_battery_soc') }}% (>95%). Se requiere
                acción manual para evitar salto del diferencial. Plan MPC
                solicita 0W, actualmente cargando a 3600W.
              entity_id: sensor.ovms_chispitas_metric_v_b_soc
            action: logbook.log
      - conditions:
          - condition: state
            entity_id: input_boolean.carga_chispitas_modo_manual
            state: "off"
          - condition: template
            value_template: "{{ not debe_cargar_chispitas }}"
          - condition: template
            value_template: >-
              {{ is_state('binary_sensor.ovms_chispitas_metric_v_c_charging',
              'on') }}
          - condition: template
            value_template: "{{ chispitas_en_casa }}"
          - condition: template
            value_template: "{{ states('sensor.victron_battery_soc') | float(0) <= 95 }}"
        sequence:
          - data:
              vehicle_id: chispitas
              action: stop
            action: ovms.control_charging
          - data:
              name: 🚗 Control Carga Chispitas
              message: >
                Deteniendo carga según plan MPC (potencia planificada: {{
                potencia_chispitas_ahora | int }}W). SOC Chispitas: {{
                chispitas_soc | int }}%, SOC Victron: {{
                states('sensor.victron_battery_soc') }}% (seguro)
              entity_id: sensor.ovms_chispitas_metric_v_b_soc
            action: logbook.log
      - conditions:
          - condition: template
            value_template: >-
              {{ chispitas_soc_alto and potencia_chispitas_ahora | float(0) >
              100 }}
        sequence:
          - data:
              message: >
                El nivel de batería de Chispitas ha alcanzado el {{
                chispitas_soc | int }} por ciento. La carga requiere activación
                manual para continuar.
              preannounce: true
            target:
              device_id: c4687ddd4c955825bc1538578374a35d
            action: assist_satellite.announce
          - data:
              title: ⚠️ Carga Chispitas - SOC Alto
              message: >
                El plan MPC solicita carga pero el SOC está en {{ chispitas_soc
                | int }}%. Se requiere activación manual.
              notification_id: chispitas_soc_alto
            action: persistent_notification.create
  - variables:
      plan_morgan: >
        {{ state_attr('sensor.emhass_plan_morgan_mpc_congelado',
        'plan_deferrable1_horario_mpc') | default([]) }}
      potencia_morgan_ahora: >
        {%- set now = now() %} {%- set potencia = namespace(valor=0) %} {%- set
        hora_actual = now.hour %} {%- for entry in plan_morgan %}
          {%- if entry is mapping and 'date' in entry and 'p_deferrable1' in entry %}
            {%- set entry_time = entry.date | as_datetime %}
            {%- if entry_time.hour == hora_actual %}
              {%- set potencia.valor = entry.p_deferrable1 | float(0) %}
            {%- endif %}
          {%- endif %}
        {%- endfor %} {%- if potencia.valor == 0 %}
          {%- for entry in plan_morgan %}
            {%- if entry is mapping and 'date' in entry and 'p_deferrable1' in entry %}
              {%- set entry_time = entry.date | as_datetime %}
              {%- if entry_time.hour > hora_actual and potencia.valor == 0 %}
                {%- set potencia.valor = entry.p_deferrable1 | float(0) %}
              {%- endif %}
            {%- endif %}
          {%- endfor %}
        {%- endif %} {{- potencia.valor -}}
      intensidad_morgan_amperios: |
        {{ (potencia_morgan_ahora | float(0) / 230) | round(0) | int }}
      intensidad_morgan_final: |
        {{ [6, [intensidad_morgan_amperios | int, 32] | min] | max }}
      morgan_en_casa: >-
        {{ is_state('binary_sensor.evse_192_168_1_110_conectado', 'on') or
        is_state('binary_sensor.morgan_enchufe', 'on') }}
      morgan_soc: "{{ states('sensor.morgan_bateria') | float(0) }}"
      morgan_soc_alto: "{{ morgan_soc > 90 }}"
      debe_cargar_morgan: |
        {{ potencia_morgan_ahora | float(0) > 100 and
           morgan_en_casa | bool and
           (morgan_soc | float(0)) <= 90 }}
  - choose:
      - conditions:
          - condition: state
            entity_id: input_boolean.carga_morgan_modo_manual
            state: "off"
          - condition: template
            value_template: "{{ debe_cargar_morgan }}"
          - condition: template
            value_template: "{{ is_state('binary_sensor.evse_192_168_1_110_cargando', 'off') }}"
        sequence:
          - target:
              entity_id: number.evse_192_168_1_110_intensidad
            data:
              value: "{{ intensidad_morgan_final }}"
            action: number.set_value
          - delay:
              seconds: 1
          - target:
              entity_id: button.morgan_iniciar_carga
            action: button.press
          - data:
              name: 🚙 Control Carga Morgan
              message: >
                Iniciando carga según plan MPC ({{ potencia_morgan_ahora | int
                }}W / {{ intensidad_morgan_final }}A). SOC actual: {{ morgan_soc
                | int }}%
              entity_id: sensor.morgan_bateria
            action: logbook.log
      - conditions:
          - condition: state
            entity_id: input_boolean.carga_morgan_modo_manual
            state: "off"
          - condition: template
            value_template: "{{ debe_cargar_morgan }}"
          - condition: template
            value_template: "{{ is_state('binary_sensor.evse_192_168_1_110_cargando', 'on') }}"
          - condition: template
            value_template: >
              {{ (intensidad_morgan_final -
              (states('number.evse_192_168_1_110_intensidad') | int(0))) | abs >
              2 }}
        sequence:
          - target:
              entity_id: number.evse_192_168_1_110_intensidad
            data:
              value: "{{ intensidad_morgan_final }}"
            action: number.set_value
          - data:
              name: 🚙 Control Carga Morgan
              message: >
                Ajustando intensidad de carga a {{ intensidad_morgan_final }}A
                ({{ potencia_morgan_ahora | int }}W). SOC actual: {{ morgan_soc
                | int }}%
              entity_id: sensor.morgan_bateria
            action: logbook.log
      - conditions:
          - condition: state
            entity_id: input_boolean.carga_morgan_modo_manual
            state: "off"
          - condition: template
            value_template: "{{ not debe_cargar_morgan }}"
          - condition: template
            value_template: "{{ is_state('binary_sensor.evse_192_168_1_110_cargando', 'on') }}"
          - condition: template
            value_template: "{{ morgan_en_casa }}"
        sequence:
          - target:
              entity_id: button.morgan_detener_carga
            action: button.press
          - data:
              name: 🚙 Control Carga Morgan
              message: >
                Deteniendo carga según plan MPC (potencia planificada: {{
                potencia_morgan_ahora | int }}W). SOC Morgan: {{ morgan_soc |
                int }}%
              entity_id: sensor.morgan_bateria
            action: logbook.log
