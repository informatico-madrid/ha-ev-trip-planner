# ============================================
# BINARY SENSORS FOR INTEGRATION
# ============================================
binary_sensor:
    # ==================== COCHE 1 ====================
    - name: "coche1_charging"
      unique_id: "coche1_charging_binary"
      device_class: "plug"
      state: "{{ is_state('input_boolean.coche1_cargando', 'on') }}"

    - name: "coche1_home"
      unique_id: "coche1_home_binary"
      device_class: "connectivity"
      state: "{{ is_state('input_boolean.coche1_en_casa', 'on') }}"

    - name: "coche1_plugged"
      unique_id: "coche1_plugged_binary"
      device_class: "plug"
      state: "{{ is_state('input_boolean.coche1_enchufado', 'on') }}"

    # ==================== COCHE 2 ====================
    - name: "coche2_charging"
      unique_id: "coche2_charging_binary"
      device_class: "plug"
      state: "{{ is_state('input_boolean.coche2_cargando', 'on') }}"

    - name: "coche2_home"
      unique_id: "coche2_home_binary"
      device_class: "connectivity"
      state: "{{ is_state('input_boolean.coche2_en_casa', 'on') }}"

    - name: "coche2_plugged"
      unique_id: "coche2_plugged_binary"
      device_class: "plug"
      state: "{{ is_state('input_boolean.coche2_enchufado', 'on') }}"
