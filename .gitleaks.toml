# Gitleaks configuration for secret detection
# See https://github.com/gitleaks/gitleaks#configuration

title = "gitleaks config"

# Extend default rules
extendDefault = true

# Allowlist for directories and files that may contain false positives
[allowlist]
  description = "Global allowlist for test, build, and output artifacts"
  paths = [
    '''tests\/''',
    '''\.venv\/''',
    '''node_modules\/''',
    '''_bmad-output\/''',
    '''\.pytest_cache\/''',
    '''__pycache__\/''',
    '''\.coverage''',
    '''\.mutmut-cache''',
    '''\.mypy_cache\/''',
    '''\.ruff_cache\/''',
    '''dist\/''',
    '''build\/''',
    '''\.vscode\/''',
    '''\.idea\/''',
  ]

# Additional rules for project-specific patterns
[[rules]]
  description = "Home Assistant API Key"
  regex = '''(?i)(?:ha|home.?assistant).?(?:api|token|key)["']?\s*[:=]\s*["']?[0-9a-zA-Z]{20,}'''
  keywords = ["homeassistant", "hass", "api"]

[[rules]]
  description = "GitHub Token (not github.com URLs)"
  regex = '''ghp_[a-zA-Z0-9]{36}'''
  keywords = ["ghp_"]

[[rules]]
  description = "GitLab Personal Access Token"
  regex = '''glpat-[a-zA-Z0-9_-]{20}'''
  keywords = ["glpat-"]

[[rules]]
  description = "AWS Access Key"
  regex = '''(?i)aws(.{0,20})?(?:access)?(?-i:key)["']?\s*[:=]\s*["']?[A-Z0-9]{20}'''
  keywords = ["aws"]

[[rules]]
  description = "Google API Key"
  regex = '''AIza[0-9A-Za-z\\-_]{35}'''
  keywords = ["AIza"]
