[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'

[tool.ruff]
line-length = 88

[tool.ruff.lint]
ignore = ["E501"]

[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88

[tool.pylint.MASTER]
py-version = "3.14"
ignore = ["tests"]

[tool.pylint.FORMAT]
max-line-length = 88

[tool.pylint."MESSAGES CONTROL"]
disable = [
    "too-few-public-methods",
    "too-many-instance-attributes",
    "too-many-arguments",
    "C0200",  # consider-using-enumerate: style preference, not critical
]

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "basic"
reportMissingImports = "warning"
reportMissingTypeStubs = "warning"
reportUnknownMemberType = "warning"
reportUnknownVariableType = "warning"
reportUnknownArgumentType = "warning"
exclude = [
    "**/__pycache__",
    "**/.*",
    "**/tests/**",
    ".venv/**",
    "**/node_modules/**",
]

[tool.bandit]
exclude_dirs = ["/tests"]
skips = ["B101"]  # Skip assert_used warnings in tests

[tool.deptry]
extend_exclude = ["docs", "scripts"]
ignore_notebooks = true

[tool.vulture]
min_confidence = 80
exclude = ["tests/", "docs/"]
paths = ["custom_components"]

[tool.import-linter]
root_package = "custom_components"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = "Test*"
python_functions = "test_*"
# NOTE: --cov removed from addopts because pytest-cov causes a deadlock when
# mutmut 3.x redirects stdout during in-process pytest.main() calls.
# Run coverage separately: pytest --cov=custom_components/ev_trip_planner
addopts = "-v"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore:Inheritance class.*:DeprecationWarning",
    "ignore::pytest.PytestDeprecationWarning",
]

[tool.coverage.run]
source = ["custom_components/ev_trip_planner"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 100
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstract",
]

[tool.mutmut]
paths_to_mutate = ["custom_components/ev_trip_planner"]
runner = "pytest"
tests_dir = ["tests/"]
dict_synonyms = ["Dict", "Optional"]
timeout = 600

[tool.quality-gate.mutation]
global_kill_threshold = 0.48
fail_on_missing_module = false
increment_step = 0.01
target_final = 1.00
modules_per_sprint = 2

[tool.quality-gate.mutation.modules.calculations]
kill_threshold = 0.71
status = "passing"

[tool.quality-gate.mutation.modules.utils]
kill_threshold = 0.89
status = "passing"

[tool.quality-gate.mutation.modules.definitions]
