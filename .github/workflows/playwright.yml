name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Get Python path for hass-taste-test
      run: echo "PYTHON_PATH=$(which python3)" >> $GITHUB_ENV

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Create playwright auth directory
      run: mkdir -p playwright/.auth

    - name: Run Playwright E2E tests
      # Tests use globalSetup which starts ephemeral HA and writes server-info.json
      # auth.setup.ts reads server-info.json to get the HA URL
      # DO NOT set HA_URL here - tests use ephemeral HA from globalSetup
      run: npx playwright test tests/e2e/
      env:
        CI: ${{ github.event_name == 'push' && 'true' || '' }}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
