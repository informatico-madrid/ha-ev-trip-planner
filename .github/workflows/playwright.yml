name: Playwright E2E Tests

on:
  push:
    branches: [ main, master, copilot/* ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Node dependencies
      run: npm install

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-homeassistant-2026.3.4-py3.14

    - name: Install Python and Home Assistant
      run: |
        python3 -m pip install --upgrade pip
        pip install homeassistant==2026.3.4
        pip install home-assistant-frontend==20260304

    - name: Create HA config directory
      run: |
        mkdir -p /tmp/ha-e2e-config/custom_components
        cp tests/ha-manual/configuration.yaml /tmp/ha-e2e-config/configuration.yaml
        ln -sf "$GITHUB_WORKSPACE/custom_components/ev_trip_planner" /tmp/ha-e2e-config/custom_components/ev_trip_planner
        mkdir -p playwright/.auth

    - name: Run Playwright E2E tests
      run: npx playwright test tests/e2e/ --workers=1
      env:
        CI: "true"

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results
        path: test-results/
        retention-days: 7
