name: Copilot Auto-Approve

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, ready_for_review ]
  pull_request_target:
    branches: [ main, master ]
    types: [ opened, synchronize ]

# Permisos completos para auto-aprobar y ejecutar workflows
permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  auto-approve-copilot-prs:
    runs-on: ubuntu-latest
    # Aprobar automáticamente PRs que vienen de ramas de Copilot
    if: startsWith(github.head_ref, 'copilot/') || contains(github.actor, 'copilot')
    steps:
      - name: Auto-approve Copilot PRs (reviews)
        if: github.event_name == 'pull_request'
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: |
            🤖 Auto-approved: This PR was created by a Copilot Agent.
            
            CI/CD workflows will run automatically. You can review changes manually before merging.

      - name: Auto-approve required status checks
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Get all required status checks
            const { data: protected } = await github.rest.repos.getBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: pr.head.ref
            });
            
            console.log('Branch protection for:', pr.head.ref);
            
            // Aprobar el pull request si requiere revisión
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE',
                body: '🤖 Auto-approved by Copilot Agent workflow'
              });
              console.log('Review approved');
            } catch (e) {
              console.log('Review already approved or not needed:', e.message);
            }

  auto-approve-workflow-run:
    runs-on: ubuntu-latest
    # Requerido para permitir que los workflows se ejecuten sin aprobación manual
    if: |
      github.event_name == 'pull_request' &&
      (startsWith(github.head_ref, 'copilot/') || contains(github.actor, 'copilot'))
    steps:
      - name: Get workflow runs for this PR
        id: workflow-status
        run: |
          echo "Checking workflow runs for PR..."
          # List all check runs associated with this PR
          curl -s -H "Authorization: token $${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/status" | \
            jq '.states[]'

  handle-fork-prs:
    runs-on: ubuntu-latest
    # Este job maneja PRs desde forks que normalmente requieren aprobación
    if: |
      github.event_name == 'pull_request_target' &&
      startsWith(github.head_ref, 'copilot/')
    steps:
      - name: Approve workflow run from fork
        run: |
          echo "Approving workflow run from Copilot fork PR..."
          # Utilizar la API para aprobar el PR
          curl -s -X POST -H "Authorization: token $${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            -d '{"event":"APPROVE","body":"Auto-approved from fork"}'
          
          echo "Approved!"

  auto-approve-self-authored:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.actor == github.event.pull_request.user.login
    steps:
      - name: Log self-authored
        run: echo "Self-authored PR detected, skipping auto-approve"