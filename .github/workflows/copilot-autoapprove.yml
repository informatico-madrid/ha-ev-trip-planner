name: Copilot Auto-Approve

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, ready_for_review ]
  pull_request_target:
    branches: [ main, master ]
    types: [ opened, synchronize ]

# E2E tests are MANDATORY - all UI tests must pass before merge
# This workflow waits for all required status checks before auto-approving

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  # Wait for all required checks (E2E tests) to complete before approving
  wait-for-checks:
    runs-on: ubuntu-latest
    # Only run on copilot PRs
    if: |
      startsWith(github.head_ref, 'copilot/')
    outputs:
      all_passed: ${{ steps.check_status.outputs.all_passed }}
      pr_url: ${{ github.event.pull_request.html_url }}
      pr_number: ${{ github.event.pull_request.number }}
      actor: ${{ github.actor }}
    steps:
      - name: Wait for status checks
        id: wait
        run: |
          echo "Waiting for status checks to complete..."
          PR_SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          # Wait up to 50 minutes for all checks to complete
          for i in $(seq 1 100); do
            # Get all pending status checks for the PR
            STATUSES=$(curl -s -X GET \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/commits/${PR_SHA}/statuses" \
              2>/dev/null) || STATUSES="[]"

            # Check if there are any pending statuses
            PENDING=$(echo "$STATUSES" | grep -c '"state":"pending"' || echo "0")
            TOTAL=$(echo "$STATUSES" | grep -c '"state"' || echo "0")

            if [ "$TOTAL" -gt 0 ] && [ "$PENDING" -eq 0 ]; then
              echo "All status checks completed after ${i}x30s"
              exit 0
            fi
            echo "  attempt $i: pending=$PENDING, total=$TOTAL"
            sleep 30
          done
          echo "Timeout waiting for status checks"
          exit 1

      - name: Check final status
        id: check_status
        run: |
          PR_SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          # Get the combined status
          STATUS=$(curl -s -X GET \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/commits/${PR_SHA}/status" \
            2>/dev/null)

          STATE=$(echo "$STATUS" | grep -o '"state":"[^"]*"' | cut -d'"' -f4 || echo "unknown")
          echo "Combined status state: $STATE"

          if [ "$STATE" = "success" ]; then
            echo "all_passed=true" >> $GITHUB_OUTPUT
          else
            echo "all_passed=false" >> $GITHUB_OUTPUT
          fi

  auto-approve-copilot-prs:
    runs-on: ubuntu-latest
    needs: wait-for-checks
    if: |
      needs.wait-for-checks.outputs.all_passed == 'true'
    steps:
      - name: Auto-approve PR (all checks passed)
        env:
          PR_NUMBER: ${{ needs.wait-for-checks.outputs.pr_number }}
          ACTOR: ${{ needs.wait-for-checks.outputs.actor }}
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: |
            🤖 Auto-approved: All required checks (including E2E UI tests) passed.

            This PR was created by Copilot Agent and approved after successful CI/CD.

      - name: Approve via API
        env:
          PR_NUMBER: ${{ needs.wait-for-checks.outputs.pr_number }}
        run: |
          echo "Approving PR #${PR_NUMBER} via API..."
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          REPO="${{ github.repository }}"
          curl -s -X POST -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -d '{"event":"APPROVE","body":"🤖 Auto-approved: All required checks passed."}'
          echo "Done!"

  notify-failure:
    runs-on: ubuntu-latest
    if: |
      needs.wait-for-checks.outputs.all_passed == 'false'
    steps:
      - name: Comment on PR about failure
        env:
          PR_NUMBER: ${{ needs.wait-for-checks.outputs.pr_number }}
        run: |
          echo "E2E tests failed. Not auto-approving PR #${PR_NUMBER}."
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          REPO="${{ github.repository }}"
          curl -s -X POST -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -d '{"body":"🤖 **E2E tests failed.** This PR cannot be auto-approved. Please fix the failing tests before re-requesting review."}'
