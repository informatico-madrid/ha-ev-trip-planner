name: Copilot Auto-Approve

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, ready_for_review ]
  pull_request_target:
    branches: [ main, master ]
    types: [ opened, synchronize ]

# Reemplaza el token de GitHub con permisos de escritura en pull requests
permissions:
  pull-requests: write

jobs:
  auto-approve-copilot-prs:
    runs-on: ubuntu-latest
    # Aprobar automáticamente PRs que vienen de ramas de Copilot
    if: startsWith(github.head_ref, 'copilot/') || contains(github.actor, 'copilot')
    steps:
      - name: Auto-approve Copilot PRs
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: |
            Auto-approved: This PR was created by a Copilot Agent and is being auto-approved for CI/CD.
            
            If you need to review the changes manually, you can do so before merging.
      - name: Auto-merge if tests pass
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const checkRuns = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            // Si los checks de estado están pasando, hacer auto-merge
            const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });
            
            const allSuccess = statuses.every(s => s.state === 'success');
            if (allSuccess) {
              console.log('All checks passed, auto-merging PR #' + pr.number);
              // Descomenta para habilitar auto-merge:
              // await github.rest.pulls.merge({
              //   owner: context.repo.owner,
              //   repo: context.repo.repo,
              //   pull_number: pr.number,
              //   merge_method: 'squash'
              // });
            } else {
              console.log('Waiting for checks to complete...');
            }

  auto-approve-self-authored:
    runs-on: ubuntu-latest
    # Aprobar PRs del mismo repositorio que son del agente de Copilot (cuando el actor es el mismo que el autor del PR)
    if: |
      github.event_name == 'pull_request' &&
      github.actor == github.event.pull_request.user.login
    steps:
      - name: Check if self-authored
        run: |
          echo "Self-authored PR detected, skipping auto-approve to avoid loops"