name: Copilot Auto-Approve

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, ready_for_review ]
  pull_request_target:
    branches: [ main, master ]
    types: [ opened, synchronize ]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-copilot-prs:
    runs-on: ubuntu-latest
    if: |
      startsWith(github.head_ref, 'copilot/') || 
      contains(github.actor, 'copilot')
    steps:
      - name: Auto-approve PRs
        if: github.event_name == 'pull_request'
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: |
            🤖 Auto-approved: This PR was created by a Copilot Agent.
            
            CI/CD workflows will run automatically.

      - name: Approve via API
        if: github.event_name == 'pull_request'
        run: |
          echo "Approving PR via API..."
          curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            -d '{"event":"APPROVE","body":"🤖 Auto-approved by workflow"}'
          echo "Done!"

  handle-fork-prs:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' &&
      startsWith(github.head_ref, 'copilot/')
    steps:
      - name: Approve fork PRs
        run: |
          echo "Approving fork PR..."
          curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            -d '{"event":"APPROVE","body":"🤖 Auto-approved"}'
          echo "Approved!"