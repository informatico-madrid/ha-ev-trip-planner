services:
  homeassistant-test:
    container_name: ha-ev-test
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "18124:8123"
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ${PROJECT_ROOT}/test-ha/config:/config
      - /etc/localtime:/etc/localtime:ro
      - ${PROJECT_ROOT}/test-ha/config/custom_components/ev_trip_planner:/config/custom_components/ev_trip_planner
      - ${TEST_HA_CONFIG}:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8123/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
