# ============================================
# INPUT NUMBERS MOCK PARA TESTS E2E
# ============================================
# Sensores numéricos configurables para los vehículos de prueba
# Pueden ser manipulados via API REST durante los tests

# Coche 1 - Chispitas
coche1_battery_capacity:
  name: "Coche1 Capacidad Batería"
  initial: 60.0
  min: 10.0
  max: 200.0
  step: 1.0
  unit_of_measurement: "kWh"
  mode: box

coche1_charging_power:
  name: "Coche1 Potencia Carga"
  initial: 11.0
  min: 1.0
  max: 22.0
  step: 0.5
  unit_of_measurement: "kW"
  mode: box

coche1_consumption:
  name: "Coche1 Consumo"
  initial: 0.15
  min: 0.05
  max: 0.5
  step: 0.01
  unit_of_measurement: "kWh/km"
  mode: box

coche1_safety_margin:
  name: "Coche1 Margen Seguridad"
  initial: 10
  min: 0
  max: 50
  step: 1
  unit_of_measurement: "%"
  mode: slider

