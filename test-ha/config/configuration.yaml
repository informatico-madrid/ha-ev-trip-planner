# Home Assistant Test Configuration
# Puerto: 18124 (mapeado a 8123 internamente)
# Configuración para tests E2E sin usuario/contraseña

homeassistant:
  name: EV Trip Planner Test
  unit_system: metric
  time_zone: Europe/Madrid
  external_url: http://192.168.1.100:18123
  internal_url: http://192.168.1.100:18123

# Disable authentication for testing - allow access from trusted networks
http:
  server_port: 8123
  cors_allowed_origins:
    - http://localhost:18123
    - http://127.0.0.1:18123
    - http://localhost:8123
    - http://127.0.0.1:8123
  api_password: tests
  trusted_proxies:
    - 127.0.0.1
    - 192.168.1.0/24
  force_secure_login: false
  trusted_networks:
    - 192.168.1.0/24

# Create test user
auth_providers:
  - type: homeassistant
    users:
      - email: tests@test.com
        name: Tests
        username: tests
        password: tests

# Allow API access from trusted networks without authentication
api:
  api_password: tests

# Enable logging for debugging
logger:
  default: info
  logs:
    custom_components.ev_trip_planner: debug

# Configuración mínima para tests
config:

# Sensores mock para tests E2E - incluye por tipo
# Cada archivo contiene inputs para 5 vehículos (coche1-coche5)
input_number: !include input_number.yaml
input_boolean: !include input_boolean.yaml
template: !include template_sensors.yaml

# Panel Custom para EV Trip Planner - ambos vehículos que funcionan
panel_custom:
  - name: "ev-trip-planner-Coche2"
    sidebar_title: "Coche2"
    sidebar_icon: "mdi:car"
    module_url: "/ev-trip-planner/panel.js?v=3.0.0"
    config:
      vehicle_id: "Coche2"
  - name: "ev-trip-planner-CochePrueba"
    sidebar_title: "CochePrueba"
    sidebar_icon: "mdi:car"
    module_url: "/ev-trip-planner/panel.js?v=3.0.0"
    config:
      vehicle_id: "CochePrueba"
