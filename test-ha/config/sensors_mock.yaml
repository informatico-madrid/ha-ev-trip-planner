# ============================================
# SENSORES MOCK PARA TESTS E2E
# ============================================
# Estos sensores simulan los sensores OVMS reales
# y pueden ser manipulados via API REST para los tests
# 
# Para manipularlos:
#   curl -X POST "http://localhost:18123/api/services/input_number/set" \
#     -H "Authorization: Bearer $TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '{"entity_id": "input_number.coche1_battery_capacity", "value": 75}'
# ============================================

# -----------------------------------------------------------
# COCHE 1 - Chispitas (basado en configuración de producción)
# -----------------------------------------------------------
input_number:
  # Sensores de configuración
  coche1_battery_capacity:
    name: "Coche1 Capacidad Batería"
    initial: 60.0
    min: 10.0
    max: 200.0
    step: 1.0
    unit_of_measurement: "kWh"
    mode: box

  coche1_charging_power:
    name: "Coche1 Potencia Carga"
    initial: 11.0
    min: 1.0
    max: 22.0
    step: 0.5
    unit_of_measurement: "kW"
    mode: box

  coche1_consumption:
    name: "Coche1 Consumo"
    initial: 0.15
    min: 0.05
    max: 0.5
    step: 0.01
    unit_of_measurement: "kWh/km"
    mode: box

  coche1_safety_margin:
    name: "Coche1 Margen Seguridad"
    initial: 10
    min: 0
    max: 50
    step: 1
    unit_of_measurement: "%"
    mode: slider

# Sensores binarios (presence/charging)
input_boolean:
  coche1_charging:
    name: "Coche1 Cargando"
    initial: off
    icon: mdi:lightning-bolt

  coche1_home:
    name: "Coche1 En Casa"
    initial: on
    icon: mdi:home

  coche1_plugged:
    name: "Coche1 Enchufado"
    initial: on
    icon: mdi:power-plug

# Sensores derivados (template)
template:
  - sensor:
      - name: "Coche1 SOC Actual"
        unit_of_measurement: "%"
        state: "{{ states('input_number.coche1_battery_capacity') | float(0) }}"
        
      - name: "Coche1 Estado Carga"
        icon: "{{ 'mdi:battery-charging' if is_state('input_boolean.coche1_charging', 'on') else 'mdi:battery' }}"
        state: "{{ 'charging' if is_state('input_boolean.coche1_charging', 'on') else 'idle' }}"
        
      - name: "Coche1 Presencia"
        icon: "{{ 'mdi:home' if is_state('input_boolean.coche1_home', 'on') else 'mdi:home-off' }}"
        state: "{{ 'home' if is_state('input_boolean.coche1_home', 'on') else 'away' }}"
        
      - name: "Coche1 Conexión"
        icon: "{{ 'mdi:power-plug' if is_state('input_boolean.coche1_plugged', 'on') else 'mdi:power-plug-off' }}"
        state: "{{ 'plugged' if is_state('input_boolean.coche1_plugged', 'on') else 'unplugged' }}"


