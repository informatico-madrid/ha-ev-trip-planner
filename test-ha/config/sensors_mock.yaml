# ============================================
# SENSORES MOCK PARA TESTS E2E
# ============================================
# Estos sensores simulan los sensores OVMS reales
# y pueden ser manipulados via API REST para los tests
#
# Para manipularlos:
#   curl -X POST "http://localhost:8123/api/services/input_number/set" \
#     -H "Authorization: Bearer $TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '{"entity_id": "input_number.coche1_battery_capacity", "value": 75}'
# ============================================

# -----------------------------------------------------------
# Todos los input_numbers para todos los coches
# -----------------------------------------------------------
input_number:
  # COCHE 1 - Chispitas
  coche1_battery_capacity:
    name: "Coche1 Capacidad Batería"
    initial: 60.0
    min: 10.0
    max: 200.0
    step: 1.0
    unit_of_measurement: "kWh"
    mode: box

  coche1_charging_power:
    name: "Coche1 Potencia Carga"
    initial: 11.0
    min: 1.0
    max: 22.0
    step: 0.5
    unit_of_measurement: "kW"
    mode: box

  coche1_consumption:
    name: "Coche1 Consumo"
    initial: 0.15
    min: 0.05
    max: 0.5
    step: 0.01
    unit_of_measurement: "kWh/km"
    mode: box

  coche1_safety_margin:
    name: "Coche1 Margen Seguridad"
    initial: 10
    min: 0
    max: 50
    step: 1
    unit_of_measurement: "%"
    mode: slider

  # COCHE 2 - Morgan
  coche2_battery_capacity:
