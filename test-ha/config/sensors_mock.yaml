# -----------------------------------------------------------
# Todos los input_booleanos para todos los coches
# -----------------------------------------------------------
input_boolean:
  # COCHE 1
  coche1_charging:
    name: "Coche1 Cargando"
    initial: off
    icon: mdi:lightning-bolt

  coche1_home:
    name: "Coche1 En Casa"
    initial: on
    icon: mdi:home

  coche1_plugged:
    name: "Coche1 Enchufado"
    initial: on
    icon: mdi:power-plug

  # COCHE 2
  coche2_charging:
    name: "Coche2 Cargando"
    initial: off
    icon: mdi:lightning-bolt

  coche2_home:
    name: "Coche2 En Casa"
    initial: on
    icon: mdi:home

  coche2_plugged:
    name: "Coche2 Enchufado"
    initial: on
    icon: mdi:power-plug

  # COCHE 3
  coche3_charging:
    name: "Coche3 Cargando"
    initial: off
    icon: mdi:lightning-bolt

  coche3_home:
    name: "Coche3 En Casa"
    initial: off
    icon: mdi:home

  coche3_plugged:
    name: "Coche3 Enchufado"
    initial: on
    icon: mdi:power-plug

  # COCHE 4
  coche4_charging:
    name: "Coche4 Cargando"
    initial: off
    icon: mdi:lightning-bolt

  coche4_home:
    name: "Coche4 En Casa"
    initial: on
    icon: mdi:home

  coche4_plugged:
    name: "Coche4 Enchufado"
    initial: off
    icon: mdi:power-plug

  # COCHE 5
  coche5_charging:
    name: "Coche5 Cargando"
    initial: on
    icon: mdi:lightning-bolt

  coche5_home:
    name: "Coche5 En Casa"
    initial: on
    icon: mdi:home

  coche5_plugged:
    name: "Coche5 Enchufado"
    initial: on
    icon: mdi:power-plug

# -----------------------------------------------------------
# Sensores template para todos los coches
# -----------------------------------------------------------
template:
  - sensor:
      # COCHE 1 Sensores
      - name: "Coche1 SOC Actual"
        unique_id: coche1_soc_actual_1
        unit_of_measurement: "%"
        state: "{{ states('input_number.coche1_battery_capacity') | float(0) }}"

      - name: "Coche1 Estado Carga"
        unique_id: coche1_estado_carga_1
        icon: "{{ 'mdi:battery-charging' if is_state('input_boolean.coche1_charging', 'on') else 'mdi:battery' }}"
        state: "{{ 'charging' if is_state('input_boolean.coche1_charging', 'on') else 'idle' }}"

      - name: "Coche1 Presencia"
        unique_id: coche1_presencia_1
        icon: "{{ 'mdi:home' if is_state('input_boolean.coche1_home', 'on') else 'mdi:home-off' }}"
        state: "{{ 'home' if is_state('input_boolean.coche1_home', 'on') else 'away' }}"

      - name: "Coche1 Conexión"
        unique_id: coche1_conexion_1
        icon: "{{ 'mdi:power-plug' if is_state('input_boolean.coche1_plugged', 'on') else 'mdi:power-plug-off' }}"
        state: "{{ 'plugged' if is_state('input_boolean.coche1_plugged', 'on') else 'unplugged' }}"

      - name: "Coche1 KWh Hoy"
        unique_id: coche1_kwh_today
        unit_of_measurement: "kWh"
        state_class: measurement
        state: "{{ 15.3 }}"

      - name: "Coche1 Horas Hoy"
        unique_id: coche1_hours_today
        unit_of_measurement: "h"
        state_class: measurement
        state: "{{ 3.2 }}"

      - name: "Coche1 Próximo Viaje"
        unique_id: coche1_next_trip
        state: "{{ 'No hay viajes programados' }}"

      - name: "Coche1 Lista Viajes"
        unique_id: coche1_trips_list
        state: "{{ 0 }}"

      - name: "Coche1 Viajes Recurrentes"
        unique_id: coche1_recurring_trips_count
        state: "{{ 0 }}"

      - name: "Coche1 Viajes Puntuales"
        unique_id: coche1_punctual_trips_count
        state: "{{ 0 }}"

      # COCHE 2 Sensores
      - name: "Coche2 SOC Actual"
