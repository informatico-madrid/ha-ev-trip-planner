
# Minimal configuration for E2E tests - NO default_config to ensure fast startup
# default_config loads 40+ integrations and slows HA startup from 20s to 90s in CI

http:
  server_host: 0.0.0.0
  server_port: 8123

homeassistant:
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 127.0.0.1
        - 172.17.0.0/16
        - ::1
      allow_bypass_login: true
    - type: homeassistant

logger:
  default: warning
  logs:
    homeassistant.components.ev_trip_planner: debug

# Required by E2E tests: the config flow presence step needs a binary_sensor or input_boolean
input_boolean:
  test_ev_charging:
    name: "EV Charging Test"
    initial: false

# Only load frontend (required for panel serving) - NO other integrations
frontend:
logger:
  default: warning

