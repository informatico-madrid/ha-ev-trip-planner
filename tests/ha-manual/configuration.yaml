http:
  server_host: 0.0.0.0
  server_port: 8123

homeassistant:
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 127.0.0.1
        - 172.17.0.0/16
        - ::1
      allow_bypass_login: true
    - type: homeassistant

logger:
  default: warning
  logs:
    homeassistant.components.ev_trip_planner: debug

input_boolean:
  test_ev_charging:
    name: "EV Charging Test"
    initial: false

frontend:
