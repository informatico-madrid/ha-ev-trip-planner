# Minimal configuration for E2E tests
# NO default_config - we only load what we need for E2E tests

http:
  server_host: 0.0.0.0
  server_port: 8123

homeassistant:
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 127.0.0.1
        - 172.17.0.0/16
        - ::1
      allow_bypass_login: true
    - type: homeassistant
  components:
    - input_boolean

# Required by E2E tests: the config flow presence step needs a binary_sensor or input_boolean
input_boolean:
  test_ev_charging:
    name: "EV Charging Test"
    initial: false
